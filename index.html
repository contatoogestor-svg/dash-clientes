<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Funil — ADS FLOW</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="client-logo" id="clientLogo">
        <img src="assets/logos/nutrigene.png" alt="Nutrigene" id="clientLogoImg">
      </div>
      <div class="header-info">
        <h1 id="clientName">Clinica Nutrigene</h1>
        <span class="header-subtitle">Dashboard de Performance</span>
      </div>
    </div>
    <div class="header-center">
      <img src="assets/logos/adsflow.png" alt="ADS FLOW" class="adsflow-logo">
    </div>
    <div class="header-right">
      <!-- Platform Selector -->
      <div class="platform-selector">
        <button class="platform-btn active" data-platform="google" id="btnGoogle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google Ads
        </button>
        <button class="platform-btn" data-platform="meta" id="btnMeta">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          Meta Ads
        </button>
      </div>
    </div>
  </header>

  <!-- Period Selector -->
  <div class="period-bar">
    <div class="period-presets">
      <button class="period-btn" data-period="today">Hoje</button>
      <button class="period-btn" data-period="7d">Ultimos 7 dias</button>
      <button class="period-btn active" data-period="month">Este mes</button>
      <button class="period-btn" data-period="last-month">Mes passado</button>
      <button class="period-btn" data-period="custom">Personalizado</button>
    </div>
    <div class="period-custom" id="periodCustom" style="display:none;">
      <input type="date" id="dateStart" class="date-input">
      <span class="date-separator">ate</span>
      <input type="date" id="dateEnd" class="date-input">
      <button class="date-apply" id="dateApply">Aplicar</button>
    </div>
    <div class="period-display">
      <span id="periodLabel">01/03/2026 — 11/03/2026</span>
    </div>
  </div>

  <!-- Investment Banner -->
  <div class="investment-banner">
    <div class="investment-icon">R$</div>
    <div class="investment-info">
      <span class="investment-label">Investimento no periodo</span>
      <span class="investment-value" id="investmentValue">R$ 0,00</span>
    </div>
  </div>

  <!-- Funnel Container -->
  <main class="funnel-container" id="funnelContainer">
    <!-- Funnel steps will be rendered by JS -->
    <div class="funnel-loading" id="funnelLoading">
      <div class="spinner"></div>
      <span>Carregando dados...</span>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <img src="assets/logos/adsflow.png" alt="ADS FLOW" class="footer-logo">
    <span class="footer-sep">|</span>
    <span>Atualizado em: <span id="lastUpdate">—</span></span>
  </footer>

  <!-- Save Toast -->
  <div class="toast" id="toast">
    <span class="toast-icon">&#10003;</span>
    <span class="toast-msg" id="toastMsg">Dados salvos com sucesso!</span>
  </div>

  <script src="js/config.js"></script>
  <script src="js/funnel.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
